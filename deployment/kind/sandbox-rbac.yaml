# Minimal namespace + ServiceAccount that the Craft Kubernetes sandbox
# manager expects to exist when SANDBOX_BACKEND=kubernetes.
#
# Used by CI (pr-craft-k8s-tests.yml) to make a kind cluster look like a
# production Onyx deployment for sandbox tests. The production helm chart
# creates the namespace via sandbox-namespace.yaml (gated on ENABLE_CRAFT),
# and the ServiceAccount is provisioned out-of-band in the internal repo.
# This file is the CI equivalent.
apiVersion: v1
kind: Namespace
metadata:
  name: onyx-sandboxes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-file-sync
  namespace: onyx-sandboxes
