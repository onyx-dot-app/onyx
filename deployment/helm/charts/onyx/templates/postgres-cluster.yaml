{{- /*
CNPG Cluster CR. The CRDs live in crds/cnpg-crds.yaml (copied from the
subchart) so Helm pre-installs them before templates — no hook needed.
Name must differ from the operator Deployment (`<release>-<nameOverride>`)
to avoid a ServiceAccount collision. POSTGRES_HOST in configmap.yaml must
stay in sync: `<cluster-name>-rw`.
*/}}
{{- /* `postgresql.cluster.enabled` gates only the Cluster CR. Default
       tracks `postgresql.enabled` for back-compat — installs with the
       subchart on still render the Cluster CR; installs with the subchart
       off (external Postgres) still skip the CR. Set `cluster.enabled:
       true` explicitly to render the Cluster CR while disabling the
       in-chart CNPG subchart (used by the local-cluster dev-up.sh path
       that pre-installs CNPG separately). */}}
{{- $pgClusterEnabled := .Values.postgresql.enabled }}
{{- if and (hasKey .Values.postgresql "cluster") (hasKey (default dict .Values.postgresql.cluster) "enabled") }}
{{-   $pgClusterEnabled = .Values.postgresql.cluster.enabled }}
{{- end }}
{{- if $pgClusterEnabled }}
{{- $pgSecretName := include "onyx.secretName" .Values.auth.postgresql -}}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}-pg
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgresql.cluster.instances | default 1 }}
  storage:
    size: {{ .Values.postgresql.cluster.storage.size | default "10Gi" }}
    {{- with .Values.postgresql.cluster.storage.storageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
  {{- if hasKey .Values.postgresql.cluster "enableSuperuserAccess" }}
  enableSuperuserAccess: {{ .Values.postgresql.cluster.enableSuperuserAccess }}
  {{- else }}
  enableSuperuserAccess: true
  {{- end }}
  superuserSecret:
    name: {{ $pgSecretName }}
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: {{ $pgSecretName }}
  {{- with .Values.postgresql.cluster.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
