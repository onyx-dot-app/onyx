{{- /*
CloudNativePG Cluster custom resource. The chart's `cloudnative-pg` subchart
(aliased as `postgresql`) installs the CNPG *operator* — but the operator
needs a Cluster CR to act on. Without this template, a fresh install brings
up the operator with no actual postgres pod, and `<release>-<name>-rw` (used
by POSTGRES_HOST in templates/configmap.yaml) does not resolve.

The Cluster name MUST match `<release>-<postgresql.nameOverride>` so the
generated `-rw` Service aligns with POSTGRES_HOST.
*/}}
{{- if .Values.postgresql.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}-{{ default "postgresql" .Values.postgresql.nameOverride }}
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgresql.cluster.instances | default 1 }}
  storage:
    size: {{ .Values.postgresql.cluster.storage.size | default "10Gi" }}
    {{- with .Values.postgresql.cluster.storage.storageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
  enableSuperuserAccess: {{ .Values.postgresql.cluster.enableSuperuserAccess | default true }}
  superuserSecret:
    name: {{ .Values.postgresql.cluster.superuserSecret.name | default .Values.auth.postgresql.secretName }}
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: {{ .Values.postgresql.cluster.superuserSecret.name | default .Values.auth.postgresql.secretName }}
  {{- with .Values.postgresql.cluster.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
