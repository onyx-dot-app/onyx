{{- /*
CNPG Cluster CR. Name must differ from the operator Deployment name
(`<release>-<nameOverride>`) to avoid a ServiceAccount collision that
prevents the initdb Job from starting. POSTGRES_HOST in configmap.yaml
must stay in sync: `<cluster-name>-rw`. Applied as a post-install hook
because the CNPG CRDs ship in templates/ (not crds/).
*/}}
{{- if .Values.postgresql.enabled }}
{{- $pgSecretName := include "onyx.secretName" .Values.auth.postgresql -}}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}-pg
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  instances: {{ .Values.postgresql.cluster.instances | default 1 }}
  storage:
    size: {{ .Values.postgresql.cluster.storage.size | default "10Gi" }}
    {{- with .Values.postgresql.cluster.storage.storageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
  {{- if hasKey .Values.postgresql.cluster "enableSuperuserAccess" }}
  enableSuperuserAccess: {{ .Values.postgresql.cluster.enableSuperuserAccess }}
  {{- else }}
  enableSuperuserAccess: true
  {{- end }}
  superuserSecret:
    name: {{ $pgSecretName }}
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: {{ $pgSecretName }}
  {{- with .Values.postgresql.cluster.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
