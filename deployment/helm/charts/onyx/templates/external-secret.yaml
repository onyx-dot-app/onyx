{{- if .Values.externalSecret.enabled }}
{{- if not .Values.externalSecret.refPath }}
{{- fail "externalSecret.enabled=true but externalSecret.refPath is empty. Set externalSecret.refPath to the upstream secret identifier (e.g. AWS Secrets Manager secret name)." }}
{{- end }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.secretName }}
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.refPath | quote }}
{{- end }}
