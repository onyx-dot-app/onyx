apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.envConfigMapName }}
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
data:
  INTERNAL_URL: "http://{{ include "onyx.fullname" . }}-api-service:{{ .Values.api.service.servicePort | default 8080 }}"
  {{- /* See postgres-cluster.yaml for the cluster.enabled gate rationale. */}}
  {{- $pgClusterEnabled := .Values.postgresql.enabled }}
  {{- if and (hasKey .Values.postgresql "cluster") (hasKey (default dict .Values.postgresql.cluster) "enabled") }}
  {{-   $pgClusterEnabled = .Values.postgresql.cluster.enabled }}
  {{- end }}
  {{- if $pgClusterEnabled }}
  POSTGRES_HOST: {{ .Release.Name }}-pg-rw
  {{- end }}
  {{- if .Values.opensearch.enabled }}
  OPENSEARCH_HOST: {{ .Values.opensearch.clusterName }}-{{ .Values.opensearch.nodeGroup }}.{{ .Release.Namespace }}.svc.cluster.local
  OPENSEARCH_REST_API_PORT: "9200"
  ENABLE_OPENSEARCH_INDEXING_FOR_ONYX: "true"
  ENABLE_OPENSEARCH_RETRIEVAL_FOR_ONYX: "false"
  {{- end }}
  {{- if .Values.redis.enabled }}
  # Standalone Redis CR produces a Service named after the CR (no `-master`
  # suffix — that suffix is only for RedisReplication CRs).
  REDIS_HOST: {{ .Values.redis.redisStandalone.name | default .Release.Name }}
  {{- end }}
  {{- /* Auto-derived only when not explicitly set in configMap. The
         local-cluster app overlay overrides these to point at the shared
         infra release's model servers in `onyx-infra`. */}}
  {{- if not (hasKey .Values.configMap "MODEL_SERVER_HOST") }}
  MODEL_SERVER_HOST: "{{ include "onyx.fullname" . }}-inference-model-service"
  {{- end }}
  {{- if .Values.vectorDB.enabled }}
  {{- if not (hasKey .Values.configMap "INDEXING_MODEL_SERVER_HOST") }}
  INDEXING_MODEL_SERVER_HOST: "{{ include "onyx.fullname" . }}-indexing-model-service"
  {{- end }}
  {{- if not (hasKey .Values.configMap "DISABLE_VECTOR_DB") }}
  DISABLE_VECTOR_DB: "false"
  {{- end }}
  {{- else }}
  {{- if not (hasKey .Values.configMap "DISABLE_VECTOR_DB") }}
  DISABLE_VECTOR_DB: "true"
  {{- end }}
  {{- end }}
{{- range $key, $value := .Values.configMap }}
{{- if not (empty $value) }}
  {{ $key }}: "{{ $value }}"
{{- end }}
{{- end }}
  {{- if .Values.minio.enabled }}
  S3_ENDPOINT_URL: "http://{{ .Release.Name }}-minio:{{ default 9000 .Values.minio.service.port }}"
  {{- end }}
  {{- if .Values.codeInterpreter.enabled }}
  CODE_INTERPRETER_BASE_URL: "http://{{ .Release.Name }}-code-interpreter:{{ .Values.codeInterpreter.service.port }}"
  {{- end }}
  {{- if eq (include "onyx.sandboxProxyEnabled" .) "true" }}
  SANDBOX_PROXY_HOST: "{{ include "onyx.fullname" . }}-sandbox-proxy.{{ .Release.Namespace }}.svc.cluster.local"
  SANDBOX_PROXY_PORT: "{{ (((.Values.sandboxProxy | default dict).service | default dict).proxyPort | default 8080) }}"
  {{- end }}
  {{- if and (toString (index .Values.configMap "ENABLE_CRAFT" | default "") | eq "true") (not (index .Values.configMap "SANDBOX_API_SERVER_URL")) }}
  {{- fail "configMap.SANDBOX_API_SERVER_URL must be set when configMap.ENABLE_CRAFT is enabled" }}
  {{- end }}
  {{- if and (toString (index .Values.configMap "ENABLE_CRAFT" | default "") | eq "true") (not .Values.auth.sandboxPushSecret.enabled) }}
  {{- fail "auth.sandboxPushSecret.enabled must be true when configMap.ENABLE_CRAFT is enabled" }}
  {{- end }}
