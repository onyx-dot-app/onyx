{{- if eq (toString (index .Values.configMap "ENABLE_CRAFT" | default "")) "true" }}
{{- $pushSecret := .Values.auth.sandboxPushSecret -}}
{{- if empty $pushSecret.existingSecret -}}
{{- $sandboxNs := .Values.configMap.SANDBOX_NAMESPACE | default "onyx-sandboxes" -}}
{{- $secretName := include "onyx.secretName" $pushSecret -}}
{{- $releaseSecret := lookup "v1" "Secret" $.Release.Namespace $secretName -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $sandboxNs }}
type: Opaque
stringData:
{{- range $name, $value := $pushSecret.values }}
{{- if not (empty $value) }}
  {{ $name }}: {{ $value | quote }}
{{- else if and $releaseSecret (hasKey $releaseSecret.data $name) }}
  {{ $name }}: {{ index $releaseSecret.data $name | b64dec | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
