apiVersion: v2
name: onyx
description: A Helm chart for Kubernetes
home: https://www.onyx.app/
sources:
  - "https://github.com/onyx-dot-app/onyx"
type: application
version: 0.5.8
appVersion: latest
annotations:
  category: Productivity
  licenses: MIT
  images: |
    - name: webserver
      image: docker.io/onyxdotapp/onyx-web-server:latest
    - name: background
      image: docker.io/onyxdotapp/onyx-backend:latest
  artifacthub.io/changes: |
    - kind: changed
      description: Rename the `vespa_metadata_sync` queue to
        `document_index_metadata_sync` in the light worker. Operators
        should drain the old queue before rolling out. Metadata sync
        task is idempotent (re-issued every 20s from Postgres
        source-of-truth), so in-flight tasks on the old queue are
        recovered automatically.
    - kind: removed
      description: Remove the `opensearch_migration` queue from the
        light worker's subscription list. The Vespa→OpenSearch
        migration tooling has been deleted; the queue is no longer
        produced or consumed.
dependencies:
  - name: cloudnative-pg
    version: 0.26.0
    repository: https://cloudnative-pg.github.io/charts
    condition: postgresql.enabled
    alias: postgresql
  - name: opensearch
    version: 3.6.0
    repository: https://opensearch-project.github.io/helm-charts
    condition: opensearch.enabled
  - name: ingress-nginx
    version: 4.13.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: nginx.enabled
    alias: nginx
  # Installs the Redis CRD that the 'redis' subchart's CR binds to.
  - name: redis-operator
    version: 0.24.0
    repository: https://ot-container-kit.github.io/helm-charts
    condition: redis.enabled
  - name: redis
    version: 0.16.6
    repository: https://ot-container-kit.github.io/helm-charts
    condition: redis.enabled
  - name: minio
    version: 5.4.0
    repository: https://charts.min.io/
    condition: minio.enabled
  - name: code-interpreter
    version: 0.3.3
    repository: https://onyx-dot-app.github.io/python-sandbox/
    condition: codeInterpreter.enabled
