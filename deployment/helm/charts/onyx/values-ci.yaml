# Craft K8s CI overlay for a Helm-installed kind cluster.

vectorDB:
  enabled: true

opensearch:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1500m
      memory: 2Gi
  persistence:
    enabled: true
    size: 1Gi
  opensearchJavaOpts: "-Xmx512m -Xms512m"

nginx:
  enabled: false

ingress:
  enabled: false

letsencrypt:
  enabled: false

codeInterpreter:
  enabled: false

configMap:
  ENABLE_CRAFT: "true"
  INTEGRATION_TESTS_MODE: "true"
  DISABLE_TELEMETRY: "true"
  DISABLE_MODEL_SERVER: "true"
  SANDBOX_API_SERVER_URL: "http://onyx-api-service.onyx.svc.cluster.local:8080"
  SANDBOX_CONTAINER_IMAGE: "localhost:5001/onyx-sandbox:ci"
  SANDBOX_POD_CPU_REQUEST: "100m"
  SANDBOX_POD_MEMORY_REQUEST: "256Mi"
  SANDBOX_POD_CPU_LIMIT: "2000m"
  SANDBOX_POD_MEMORY_LIMIT: "6Gi"
  # Avoid kind evictions under sandbox disk pressure.
  SANDBOX_POD_EPHEMERAL_STORAGE_REQUEST: "2Gi"
  SANDBOX_POD_EPHEMERAL_STORAGE_LIMIT: "8Gi"

postgresql:
  cluster:
    storage:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

sandboxProxy:
  replicaCount: 1

auth:
  postgresql:
    values:
      username: "postgres"
      password: "password"
  redis:
    values:
      redis_password: "password"
  objectstorage:
    values:
      s3_aws_access_key_id: "minioadmin"
      s3_aws_secret_access_key: "minioadmin"
      rootUser: "minioadmin"
      rootPassword: "minioadmin"
  opensearch:
    enabled: true
    values:
      opensearch_admin_username: "admin"
      opensearch_admin_password: "OpenSearch1!"
  sandboxPushSecret:
    enabled: true
    values:
      private_key: ""

minio:
  persistence:
    size: 1Gi
  resources:
    requests:
      memory: 256Mi

webserver:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

api:
  replicaCount: 1
  # The workflow runs migrations once after Postgres is reachable.
  runStartupMigrations: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_beat:
  replicaCount: 1

celery_worker_primary:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_light:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_heavy:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_docfetching:
  replicaCount: 0

celery_worker_docprocessing:
  replicaCount: 0

celery_worker_user_file_processing:
  replicaCount: 0

celery_worker_scheduled_tasks:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 2Gi

celery_worker_monitoring:
  replicaCount: 0

slackbot:
  enabled: false

discordbot:
  enabled: false

mcpServer:
  enabled: false

inferenceCapability:
  replicaCount: 0

indexCapability:
  replicaCount: 0
