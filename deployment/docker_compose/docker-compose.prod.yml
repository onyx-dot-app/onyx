# =============================================================================
# ONYX PRODUCTION OVERLAY — Let's Encrypt HTTPS
# =============================================================================
# Production hardening on top of docker-compose.yml. All service definitions
# live in the base file; this overlay only changes what differs in production:
#   - AUTH_TYPE defaults to oidc (configure your provider in .env)
#   - Postgres / MinIO / S3 credentials are required — compose fails fast
#     instead of falling back to weak development defaults
#   - nginx serves ports 80/443 with Let's Encrypt certificates and the
#     production template; DOMAIN comes from .env.nginx
#   - a certbot service renews certificates
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --wait
#
# Or set COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml in .env and
# use plain `docker compose up -d`. See env.prod.template for the settings
# expected in .env, and env.nginx.template for .env.nginx.
#
# First-time certificate setup: ./init-letsencrypt.sh
#
# Requires Docker Compose >= 2.24.4 (merge tags such as !override / !reset).

services:
  api_server:
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-oidc}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:?set a strong value in .env, not minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:?set a strong value in .env, not minioadmin}

  background:
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-oidc}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:?set a strong value in .env, not minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:?set a strong value in .env, not minioadmin}

  relational_db:
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set a strong value in .env}

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set a strong value in .env, not minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set a strong value in .env, not minioadmin}

  nginx:
    ports: !override
      - "80:80"
      - "443:443"
    # The base file sets DOMAIN=localhost via `environment`, which would
    # shadow the value from .env.nginx (environment beats env_file). Replace
    # the whole environment block so DOMAIN comes from .env.nginx; the proxy
    # timeouts below must be kept in sync with the base file.
    environment: !override
      - NGINX_PROXY_CONNECT_TIMEOUT=${NGINX_PROXY_CONNECT_TIMEOUT:-300}
      - NGINX_PROXY_SEND_TIMEOUT=${NGINX_PROXY_SEND_TIMEOUT:-300}
      - NGINX_PROXY_READ_TIMEOUT=${NGINX_PROXY_READ_TIMEOUT:-300}
    env_file:
      - .env.nginx
    volumes:
      - ../data/certbot/conf:/etc/letsencrypt
      - ../data/certbot/www:/var/www/certbot
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf
      && cp -a /nginx-templates/. /etc/nginx/conf.d/
      && sed 's/\r$//' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh
      && chmod +x /tmp/run-nginx.sh
      && /tmp/run-nginx.sh app.conf.template.prod"

  # follows https://pentacent.medium.com/nginx-and-lets-encrypt-with-docker-in-less-than-5-minutes-b4b8a60d3a71
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ../data/certbot/conf:/etc/letsencrypt
      - ../data/certbot/www:/var/www/certbot
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
