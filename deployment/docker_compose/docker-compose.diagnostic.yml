version: '3'

services:
  api_server:
    # Override command to run diagnostics then sleep
    command: >
      /bin/sh -c "
      echo '=======================================' &&
      echo 'RUNNING PRE-STARTUP DIAGNOSTICS' &&
      echo '=======================================' &&
      python /app/scripts/diagnose_db_connection.py &&
      echo '' &&
      echo '=======================================' &&
      echo 'DIAGNOSTICS COMPLETE' &&
      echo 'Container will now sleep for 1 hour' &&
      echo 'Press Ctrl+C to stop' &&
      echo '=======================================' &&
      sleep 3600"
