name: Build Mobile App
concurrency:
  group: Build-Mobile-App-${{ github.workflow }}-${{ github.head_ref || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

on:
  merge_group:
  pull_request:
    branches:
      - main
      - "release/**"
    paths:
      - "mobile/**"
      - ".github/workflows/pr-mobile-build.yml"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # PR / merge-group / tag: verify the iOS app compiles for the simulator (no signing).
  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2 # zizmor: ignore[cache-poisoning]
        with:
          bun-version: "1.3.13"

      - name: Install deps + generate iOS project
        working-directory: ./mobile
        run: |
          bun install --frozen-lockfile
          bunx cap add ios
          bunx cap sync ios

      - name: Build (iphonesimulator, unsigned)
        working-directory: ./mobile
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  # PR / merge-group / tag: verify the Android app assembles (debug, unsigned).
  # ubuntu-latest ships the Android SDK + JDK, so no third-party setup actions are needed.
  build-android:
    name: Build Android (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2 # zizmor: ignore[cache-poisoning]
        with:
          bun-version: "1.3.13"

      - name: Install deps + generate Android project
        working-directory: ./mobile
        run: |
          bun install --frozen-lockfile
          bunx cap add android
          bunx cap sync android

      - name: Assemble debug APK
        working-directory: ./mobile/android
        run: |
          export JAVA_HOME="${JAVA_HOME_21_X64:-$JAVA_HOME}"
          ./gradlew assembleDebug --no-daemon

  # Release: on a semver tag (excluding beta), build a signed archive and upload to
  # TestFlight. Apple secrets come from AWS Secrets Manager via OIDC (same store as the
  # desktop release). Uses an App Store Connect API key for automatic signing —
  # xcodebuild creates/manages the distribution cert + provisioning profile itself
  # (-allowProvisioningUpdates), so there's nothing to import or store by hand.
  # Inert until the deploy/apple-asc-* secrets exist.
  release-ios:
    name: Release iOS (TestFlight)
    needs: [build-ios, build-android]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta')
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get AWS Secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802
        with:
          secret-ids: |
            APPLE_TEAM_ID, deploy/apple-team-id
            APPLE_ASC_KEY_ID, deploy/apple-asc-key-id
            APPLE_ASC_ISSUER_ID, deploy/apple-asc-issuer-id
            APPLE_ASC_KEY_P8, deploy/apple-asc-key-p8
          parse-json-secrets: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2 # zizmor: ignore[cache-poisoning]
        with:
          bun-version: "1.3.13"

      - name: Install deps + generate iOS project
        working-directory: ./mobile
        run: |
          bun install --frozen-lockfile
          bunx cap add ios
          bunx cap sync ios

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_ASC_KEY_P8" | base64 --decode > ~/private_keys/AuthKey_${APPLE_ASC_KEY_ID}.p8

      - name: Generate ExportOptions.plist
        working-directory: ./mobile
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>export</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Archive (device, signed)
        working-directory: ./mobile
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -authenticationKeyPath ~/private_keys/AuthKey_${APPLE_ASC_KEY_ID}.p8 \
            -authenticationKeyID "$APPLE_ASC_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_ASC_ISSUER_ID" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            MARKETING_VERSION="${GITHUB_REF_NAME#v}" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            archive

      - name: Export + upload to TestFlight
        working-directory: ./mobile
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${APPLE_ASC_KEY_ID}.p8 \
            -authenticationKeyID "$APPLE_ASC_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_ASC_ISSUER_ID" \
            -allowProvisioningUpdates
          IPA=$(find build/export -name "*.ipa" | head -1)
          xcrun altool --upload-app --type ios \
            --file "$IPA" \
            --apiKey "$APPLE_ASC_KEY_ID" \
            --apiIssuer "$APPLE_ASC_ISSUER_ID"
