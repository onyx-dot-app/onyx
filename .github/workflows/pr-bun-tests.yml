name: Run Bun Tests
concurrency:
  group: Run-Bun-Tests-${{ github.workflow }}-${{ github.head_ref || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

on:
  merge_group:
  pull_request:
    branches:
      - main
      - "release/**"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  bun-tests:
    name: Bun Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2 # zizmor: ignore[cache-poisoning] test-only workflow; no deploy artifacts
        with:
          bun-version: "1.3.14"

      - name: Install node dependencies
        working-directory: ./web
        run: bun install --frozen-lockfile

      - name: Run Bun tests
        working-directory: ./web
        # Coverage disabled in CI: bun 1.3.14's coverage reporter crashes after
        # the table is printed but before the test summary, returning exit 1
        # even when 559/559 tests pass. Local `bun test --coverage` works.
        run: bun run test:ci
