# Ad-hoc, manually-triggered bootstrap job that mirrors this repo's CI test
# Actions secrets into the AWS Secrets Manager blob that
# onyx-dot-app/cloud-deployment-yamls reads from Terraform.
#
# Context: cloud-deployment-yamls#438 adds a `aws_secretsmanager_secret_version`
# data source for `onyx-tools/onyx-ci/test-secrets` (region us-west-2) and
# provisions the repo-scoped Actions secrets via `for_each`. That data source is
# read on every `terraform plan`, so the blob must exist and be complete BEFORE
# the PR lands. This job assembles the blob from the secrets this repo currently
# has set (the canonical source) and writes it.
#
# Run it from the onyx repo so `secrets.*` resolve to onyx's live values.
#
# Triggers:
#   - push to the bootstrap branch -> assembles the blob and WRITES it to AWS.
#     This is how we run the one-shot without merging to main, since push events
#     run the workflow straight from the branch. Keys that don't resolve are
#     written empty (allow_empty is forced on for push); fill them in a later
#     run once their values exist.
#   - workflow_dispatch (requires the file on the default branch) -> dry run by
#     default; set dry_run=false to write.
#
# This is a one-shot bootstrap; delete the workflow once the blob is populated.
# Note: while this trigger is active, every push to the branch rewrites the blob.
name: "Ad-hoc: Populate CI Test Secrets in AWS"

on:
  push:
    branches:
      - adhoc/populate-ci-test-secrets
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate the blob but do NOT write to AWS."
        type: boolean
        default: true
      secret_id:
        description: "Secrets Manager secret id to write."
        type: string
        default: "onyx-tools/onyx-ci/test-secrets"
      aws_region:
        description: "AWS region of the secret."
        type: string
        default: "us-west-2"
      aws_oidc_role_arn:
        description: "Override OIDC role ARN. Leave blank to use secrets.AWS_OIDC_ROLE_ARN. The role needs secretsmanager:DescribeSecret + CreateSecret + PutSecretValue on the secret_id."
        type: string
        default: ""
      allow_empty:
        description: "Write even if some keys resolved to empty (use only if you will fill the gaps manually)."
        type: boolean
        default: false

permissions: {}

jobs:
  populate:
    name: Populate CI test secrets blob
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # Required for OIDC-based AWS credential exchange
      contents: read
    steps:
      - name: Assemble and validate secrets blob
        env:
          ALLOW_EMPTY: ${{ github.event_name == 'push' || inputs.allow_empty }}
          OUT_FILE: ${{ runner.temp }}/ci-test-secrets.json
          # Keep this list in sync with local.ci_test_secret_names in
          # cloud-deployment-yamls/internal-tools/terraform/github-org/ci_test_secrets.tf
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          CONFLUENCE_ACCESS_TOKEN: ${{ secrets.CONFLUENCE_ACCESS_TOKEN }}
          CONFLUENCE_ACCESS_TOKEN_SCOPED: ${{ secrets.CONFLUENCE_ACCESS_TOKEN_SCOPED }}
          CONFLUENCE_TEST_PAGE_ID: ${{ secrets.CONFLUENCE_TEST_PAGE_ID }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GOOGLE_PSE_API_KEY: ${{ secrets.GOOGLE_PSE_API_KEY }}
          GOOGLE_PSE_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_PSE_SEARCH_ENGINE_ID }}
          JIRA_ADMIN_API_TOKEN: ${{ secrets.JIRA_ADMIN_API_TOKEN }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_API_TOKEN_SCOPED: ${{ secrets.JIRA_API_TOKEN_SCOPED }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          MCP_OAUTH_CLIENT_ID: ${{ secrets.MCP_OAUTH_CLIENT_ID }}
          MCP_OAUTH_CLIENT_SECRET: ${{ secrets.MCP_OAUTH_CLIENT_SECRET }}
          MCP_OAUTH_ISSUER: ${{ secrets.MCP_OAUTH_ISSUER }}
          MCP_OAUTH_JWKS_URI: ${{ secrets.MCP_OAUTH_JWKS_URI }}
          MCP_OAUTH_PASSWORD: ${{ secrets.MCP_OAUTH_PASSWORD }}
          ONYX_GITHUB_ADMIN_EMAIL: ${{ secrets.ONYX_GITHUB_ADMIN_EMAIL }}
          ONYX_GITHUB_PERMISSION_SYNC_TEST_ACCESS_TOKEN: ${{ secrets.ONYX_GITHUB_PERMISSION_SYNC_TEST_ACCESS_TOKEN }}
          ONYX_GITHUB_PERMISSION_SYNC_TEST_ACCESS_TOKEN_CLASSIC: ${{ secrets.ONYX_GITHUB_PERMISSION_SYNC_TEST_ACCESS_TOKEN_CLASSIC }}
          ONYX_GITHUB_TEST_USER_1_EMAIL: ${{ secrets.ONYX_GITHUB_TEST_USER_1_EMAIL }}
          ONYX_GITHUB_TEST_USER_2_EMAIL: ${{ secrets.ONYX_GITHUB_TEST_USER_2_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERM_SYNC_SHAREPOINT_CERTIFICATE_PASSWORD: ${{ secrets.PERM_SYNC_SHAREPOINT_CERTIFICATE_PASSWORD }}
          PERM_SYNC_SHAREPOINT_CLIENT_ID: ${{ secrets.PERM_SYNC_SHAREPOINT_CLIENT_ID }}
          PERM_SYNC_SHAREPOINT_DIRECTORY_ID: ${{ secrets.PERM_SYNC_SHAREPOINT_DIRECTORY_ID }}
          PERM_SYNC_SHAREPOINT_PRIVATE_KEY: ${{ secrets.PERM_SYNC_SHAREPOINT_PRIVATE_KEY }}
          S3_AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          S3_AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_BOT_TOKEN_TEST_SPACE: ${{ secrets.SLACK_BOT_TOKEN_TEST_SPACE }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          VERTEX_CREDENTIALS: ${{ secrets.VERTEX_CREDENTIALS }}
        run: |
          set -euo pipefail

          # The exact, ordered set of keys the blob must contain.
          KEYS=(
            ANTHROPIC_API_KEY
            AWS_OIDC_ROLE_ARN
            CONFLUENCE_ACCESS_TOKEN
            CONFLUENCE_ACCESS_TOKEN_SCOPED
            CONFLUENCE_TEST_PAGE_ID
            EXA_API_KEY
            FIRECRAWL_API_KEY
            GOOGLE_PSE_API_KEY
            GOOGLE_PSE_SEARCH_ENGINE_ID
            JIRA_ADMIN_API_TOKEN
            JIRA_API_TOKEN
            JIRA_API_TOKEN_SCOPED
            JIRA_BASE_URL
            JIRA_USER_EMAIL
            MCP_OAUTH_CLIENT_ID
            MCP_OAUTH_CLIENT_SECRET
            MCP_OAUTH_ISSUER
            MCP_OAUTH_JWKS_URI
            MCP_OAUTH_PASSWORD
            ONYX_GITHUB_ADMIN_EMAIL
            ONYX_GITHUB_PERMISSION_SYNC_TEST_ACCESS_TOKEN
            ONYX_GITHUB_PERMISSION_SYNC_TEST_ACCESS_TOKEN_CLASSIC
            ONYX_GITHUB_TEST_USER_1_EMAIL
            ONYX_GITHUB_TEST_USER_2_EMAIL
            OPENAI_API_KEY
            PERM_SYNC_SHAREPOINT_CERTIFICATE_PASSWORD
            PERM_SYNC_SHAREPOINT_CLIENT_ID
            PERM_SYNC_SHAREPOINT_DIRECTORY_ID
            PERM_SYNC_SHAREPOINT_PRIVATE_KEY
            S3_AWS_ACCESS_KEY_ID
            S3_AWS_SECRET_ACCESS_KEY
            SLACK_BOT_TOKEN
            SLACK_BOT_TOKEN_TEST_SPACE
            SLACK_CLIENT_ID
            SLACK_CLIENT_SECRET
            VERTEX_CREDENTIALS
          )

          # Write to a restricted temp file. Build with jq reading values from the
          # environment so nothing sensitive ever lands on a command line, and
          # multiline values (e.g. the SharePoint private key) are escaped correctly.
          umask 077
          keys_json="$(printf '%s\n' "${KEYS[@]}" | jq -R . | jq -s .)"
          jq -n --argjson keys "$keys_json" \
            'reduce $keys[] as $k ({}; . + {($k): (env[$k] // "")})' > "$OUT_FILE"

          echo "Assembled ${#KEYS[@]} keys into the blob:"
          echo "key,present,length"
          jq -r 'to_entries[] | "\(.key),\(.value != "" and .value != null),\(.value|length)"' "$OUT_FILE"

          mapfile -t empty_keys < <(jq -r 'to_entries[] | select(.value == "" or .value == null) | .key' "$OUT_FILE")
          if [ "${#empty_keys[@]}" -gt 0 ]; then
            echo "::warning::These keys resolved to empty: ${empty_keys[*]}"
            echo "Note: FIRECRAWL_API_KEY, GOOGLE_PSE_SEARCH_ENGINE_ID, ONYX_GITHUB_TEST_USER_1_EMAIL and ONYX_GITHUB_TEST_USER_2_EMAIL are not repo-level secrets on onyx today; they must resolve org-level or be added before this can write a complete blob."
            if [ "$ALLOW_EMPTY" != "true" ]; then
              echo "::error::Refusing to write an incomplete blob (a missing key breaks terraform plan + the nightly drift check). Add the missing secrets, or re-run via workflow_dispatch with allow_empty=true to proceed anyway."
              exit 1
            fi
          fi

          {
            echo "### CI test secrets blob"
            echo ""
            echo "- Keys assembled: \`${#KEYS[@]}\`"
            echo "- Empty keys: \`${#empty_keys[@]}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # AWS auth + write run on a branch push (one-shot bootstrap) OR an explicit
      # workflow_dispatch with dry_run=false. A dispatch with dry_run=true stops
      # after the assemble/validate step above.
      - name: Configure AWS credentials
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # ratchet:aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_oidc_role_arn != '' && inputs.aws_oidc_role_arn || secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region || 'us-west-2' }}

      - name: Write blob to Secrets Manager
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
        env:
          SECRET_ID: ${{ inputs.secret_id || 'onyx-tools/onyx-ci/test-secrets' }}
          AWS_REGION: ${{ inputs.aws_region || 'us-west-2' }}
          SECRET_FILE: ${{ runner.temp }}/ci-test-secrets.json
        run: |
          set -euo pipefail

          if aws secretsmanager describe-secret \
              --secret-id "$SECRET_ID" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Secret exists; putting a new version..."
            arn="$(aws secretsmanager put-secret-value \
              --secret-id "$SECRET_ID" --region "$AWS_REGION" \
              --secret-string "file://$SECRET_FILE" \
              --query 'ARN' --output text)"
            echo "Updated $arn"
          else
            echo "Secret does not exist; creating it..."
            arn="$(aws secretsmanager create-secret \
              --name "$SECRET_ID" --region "$AWS_REGION" \
              --description 'CI test secrets consumed by onyx pr-integration-tests / pr-playwright-tests workflows (see cloud-deployment-yamls ci_test_secrets.tf).' \
              --secret-string "file://$SECRET_FILE" \
              --query 'ARN' --output text)"
            echo "Created $arn"
          fi

          echo "### Wrote blob" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secret: \`$SECRET_ID\` (\`$AWS_REGION\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run notice
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: echo "::notice::Dry run only — no write performed. To write, run via workflow_dispatch with dry_run=false (requires the workflow on the default branch)."
