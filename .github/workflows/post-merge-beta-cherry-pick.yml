name: Post-Merge Beta Cherry-Pick

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick-to-latest-release:
    outputs:
      should_cherrypick: ${{ steps.gate.outputs.should_cherrypick }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      gate_status: ${{ steps.gate.outputs.gate_status }}
      gate_reason: ${{ steps.gate.outputs.gate_reason }}
      gate_details: ${{ steps.gate.outputs.gate_details }}
      cherry_pick_reason: ${{ steps.run_cherry_pick.outputs.reason }}
      cherry_pick_details: ${{ steps.run_cherry_pick.outputs.details }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve merged PR and checkbox state
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e

          GATE_LAST_ERROR=""
          GATE_DETAILS_DELIM="GATE_DETAILS_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_${RANDOM}_$$"

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          set_multiline_output() {
            local key="$1"
            local value="$2"
            {
              echo "${key}<<${GATE_DETAILS_DELIM}"
              printf '%s\n' "$value"
              echo "${GATE_DETAILS_DELIM}"
            } >> "$GITHUB_OUTPUT"
          }

          fail_gate() {
            local reason="$1"
            local message="$2"
            local details="$3"

            echo "::error::${message}"
            set_output "gate_status" "failure"
            set_output "gate_reason" "$reason"
            set_multiline_output "gate_details" "$(printf '%s\n' "$details" | tail -n 20)"
            exit 0
          }

          set_output "should_cherrypick" "false"
          set_output "pr_number" ""
          set_output "merged_by" ""
          set_output "gate_status" "success"
          set_output "gate_reason" ""

          api_call_with_retry() {
            local endpoint="$1"
            local max_attempts=4
            local attempt=1
            local sleep_seconds=2
            local tmp_err
            local response

            tmp_err="$(mktemp)"

            while [ "${attempt}" -le "${max_attempts}" ]; do
              if response="$(gh api "$endpoint" 2>"$tmp_err")"; then
                rm -f "$tmp_err"
                printf '%s' "$response"
                return 0
              fi

              GATE_LAST_ERROR="$(cat "$tmp_err")"
              if [ "${attempt}" -lt "${max_attempts}" ] && echo "$GATE_LAST_ERROR" | grep -qiE "rate limit|secondary rate limit|abuse detection|HTTP 5[0-9][0-9]|timeout|connection reset|unexpected EOF"; then
                echo "::warning::GitHub API call failed (attempt ${attempt}/${max_attempts}). Retrying in ${sleep_seconds}s." >&2
                sleep "${sleep_seconds}"
                sleep_seconds=$((sleep_seconds * 2))
                attempt=$((attempt + 1))
                continue
              fi

              rm -f "$tmp_err"
              return 1
            done

          }

          # For the commit that triggered this workflow (HEAD on main), fetch all
          # associated PRs and keep only the PR that was actually merged into main
          # with this exact merge commit SHA.
          if ! pr_numbers_json="$(api_call_with_retry "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls")"; then
            fail_gate "resolve-prs-failed" "Unable to resolve PRs for commit ${GITHUB_SHA}." "$GATE_LAST_ERROR"
          fi

          if ! pr_numbers="$(printf '%s' "$pr_numbers_json" | jq -r --arg sha "${GITHUB_SHA}" '.[] | select(.merged_at != null and .base.ref == "main" and .merge_commit_sha == $sha) | .number')"; then
            fail_gate "parse-prs-failed" "Unable to parse PR association response for commit ${GITHUB_SHA}." "$pr_numbers_json"
          fi

          filtered_pr_numbers="$(printf '%s\n' "$pr_numbers" | sed '/^[[:space:]]*$/d')"
          match_count="$(printf '%s\n' "$filtered_pr_numbers" | wc -l | tr -d ' ')"
          pr_number="$(printf '%s\n' "$filtered_pr_numbers" | head -n 1)"

          if [ "${match_count}" -gt 1 ]; then
            echo "::warning::Multiple merged PRs matched commit ${GITHUB_SHA}. Using PR #${pr_number}."
          fi

          if [ -z "$pr_number" ]; then
            echo "No merged PR associated with commit ${GITHUB_SHA}; skipping."
            set_output "should_cherrypick" "false"
            exit 0
          fi

          # Persist as soon as known so downstream gate-failure notifications can include source PR.
          set_output "pr_number" "$pr_number"

          # Read the PR once so we can gate behavior and infer preferred actor.
          if ! pr_json="$(api_call_with_retry "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}")"; then
            fail_gate "resolve-pr-failed" "Unable to resolve PR #${pr_number} details." "$GATE_LAST_ERROR"
          fi

          if ! pr_body="$(printf '%s' "$pr_json" | jq -r '.body // ""')"; then
            fail_gate "parse-pr-failed" "Unable to parse PR #${pr_number} body." "$pr_json"
          fi

          if ! merged_by="$(printf '%s' "$pr_json" | jq -r '.merged_by.login // ""')"; then
            fail_gate "parse-pr-failed" "Unable to parse PR #${pr_number} details." "$pr_json"
          fi

          set_output "merged_by" "$merged_by"

          if echo "$pr_body" | grep -qiE "\\[x\\][[:space:]]*(\\[[^]]+\\][[:space:]]*)?Please cherry-pick this PR to the latest release version"; then
            set_output "should_cherrypick" "true"
            echo "Cherry-pick checkbox checked for PR #${pr_number}."
            exit 0
          fi

          set_output "should_cherrypick" "false"
          echo "Cherry-pick checkbox not checked for PR #${pr_number}. Skipping."

      - name: Mark workflow as failed if gate failed
        if: steps.gate.outputs.gate_status == 'failure'
        env:
          CHERRY_PICK_GATE_REASON: ${{ steps.gate.outputs.gate_reason }}
        run: |
          echo "::error::Automated cherry-pick gating failed (${CHERRY_PICK_GATE_REASON})."
          exit 1

      - name: Checkout repository
        if: steps.gate.outputs.should_cherrypick == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: main

      - name: Install the latest version of uv
        if: steps.gate.outputs.should_cherrypick == 'true'
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # ratchet:astral-sh/setup-uv@v7
        with:
          enable-cache: false
          version: "0.9.9"

      - name: Configure git identity
        if: steps.gate.outputs.should_cherrypick == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create cherry-pick PR to latest release
        id: run_cherry_pick
        if: steps.gate.outputs.should_cherrypick == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          CHERRY_PICK_ASSIGNEE: ${{ steps.gate.outputs.merged_by }}
        run: |
          set -o pipefail
          output_file="$(mktemp)"
          uv run --no-sync --with onyx-devtools ods cherry-pick "${GITHUB_SHA}" --yes --no-verify 2>&1 | tee "$output_file"
          exit_code="${PIPESTATUS[0]}"

          if [ "${exit_code}" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=failure" >> "$GITHUB_OUTPUT"

          reason="command-failed"
          if grep -qiE "merge conflict during cherry-pick|CONFLICT|could not apply|cherry-pick in progress with staged changes" "$output_file"; then
            reason="merge-conflict"
          fi
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

          {
            echo "details<<EOF"
            tail -n 40 "$output_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Mark workflow as failed if cherry-pick step failed unexpectedly
        if: steps.gate.outputs.should_cherrypick == 'true' && steps.run_cherry_pick.outcome == 'failure' && steps.run_cherry_pick.outputs.status != 'failure'
        run: |
          echo "::error::Automated cherry-pick failed before outputs could be captured."
          exit 1

      - name: Mark workflow as failed if cherry-pick failed
        if: steps.gate.outputs.should_cherrypick == 'true' && steps.run_cherry_pick.outputs.status == 'failure'
        env:
          CHERRY_PICK_REASON: ${{ steps.run_cherry_pick.outputs.reason }}
        run: |
          echo "::error::Automated cherry-pick failed (${CHERRY_PICK_REASON})."
          exit 1

  notify-slack-on-cherry-pick-failure:
    needs:
      - cherry-pick-to-latest-release
    if: always() && needs.cherry-pick-to-latest-release.result == 'failure' && (needs.cherry-pick-to-latest-release.outputs.should_cherrypick == 'true' || needs.cherry-pick-to-latest-release.outputs.gate_status == 'failure')
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build cherry-pick failure summary
        id: failure-summary
        env:
          SOURCE_PR_NUMBER: ${{ needs.cherry-pick-to-latest-release.outputs.pr_number }}
          SOURCE_SHA: ${{ github.sha }}
          GATE_STATUS: ${{ needs.cherry-pick-to-latest-release.outputs.gate_status }}
          GATE_REASON: ${{ needs.cherry-pick-to-latest-release.outputs.gate_reason }}
          GATE_DETAILS: ${{ needs.cherry-pick-to-latest-release.outputs.gate_details }}
          CHERRY_PICK_REASON: ${{ needs.cherry-pick-to-latest-release.outputs.cherry_pick_reason }}
          CHERRY_PICK_DETAILS: ${{ needs.cherry-pick-to-latest-release.outputs.cherry_pick_details }}
        run: |
          source_pr_ref="unknown"
          if [ -n "${SOURCE_PR_NUMBER}" ]; then
            source_pr_ref="https://github.com/${GITHUB_REPOSITORY}/pull/${SOURCE_PR_NUMBER}"
          fi

          reason_text="cherry-pick command failed"
          if [ "${GATE_STATUS}" = "failure" ]; then
            reason_text="failed before cherry-pick command (gating)"
          elif [ "${CHERRY_PICK_REASON}" = "merge-conflict" ]; then
            reason_text="merge conflict during cherry-pick"
          fi

          details_blob="${CHERRY_PICK_DETAILS}"
          if [ "${GATE_STATUS}" = "failure" ]; then
            details_blob="${GATE_DETAILS}"
          fi

          details_excerpt="$(printf '%s' "${details_blob}" | tail -n 8 | tr '\n' ' ' | sed "s/[[:space:]]\\+/ /g" | sed "s/\"/'/g" | cut -c1-350)"
          failed_jobs="• cherry-pick-to-latest-release\\n• source PR: ${source_pr_ref}\\n• commit: ${SOURCE_SHA}\\n• reason: ${reason_text}"
          if [ "${GATE_STATUS}" = "failure" ] && [ -n "${GATE_REASON}" ]; then
            failed_jobs="${failed_jobs}\\n• gate reason: ${GATE_REASON}"
          fi
          if [ -n "${details_excerpt}" ]; then
            failed_jobs="${failed_jobs}\\n• excerpt: ${details_excerpt}"
          fi

          echo "jobs=${failed_jobs}" >> "$GITHUB_OUTPUT"

      - name: Notify #cherry-pick-prs about cherry-pick failure
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.CHERRY_PICK_PRS_WEBHOOK }}
          failed-jobs: ${{ steps.failure-summary.outputs.jobs }}
          title: "🚨 Automated Cherry-Pick Failed"
          ref-name: ${{ github.ref_name }}
