name: Env Drift Gate
concurrency:
  group: Env-Drift-Gate-${{ github.workflow }}-${{ github.head_ref || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

# Fails when backend code reads an operator-facing env var that no deployment
# template documents and that isn't in the committed drift baseline. Freezes the
# existing undocumented backlog in place so only NEW drift breaks the build.
# The gate script (backend/scripts/env_inventory.py) is Python-stdlib-only, so
# this job needs no dependency install. Runs unconditionally (no paths filter)
# so it always produces a status and is safe to require for merge.

on:
  merge_group:
  pull_request:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  env-drift-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # ratchet:actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check env-var drift baseline
        run: python backend/scripts/env_inventory.py --check-baseline
