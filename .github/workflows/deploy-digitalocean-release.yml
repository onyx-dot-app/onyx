name: Deploy to DigitalOcean (Release)

on:
  push:
    branches:
      - "release-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (for example 0.1.0)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from branch or input
        id: extract
        run: |
          VERSION_INPUT="${{ github.event.inputs.version }}"
          BRANCH="${{ github.ref_name }}"

          if [ -n "$VERSION_INPUT" ] && [ "$VERSION_INPUT" != "latest" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION=$(echo "$BRANCH" | sed 's/release-//')
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "[OK] Version to deploy: $VERSION"

  build-backend:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/hop-rag/activa-backend:${{ needs.extract-version.outputs.version }}
            ghcr.io/hop-rag/activa-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-web:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web server image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/hop-rag/activa-web-server:${{ needs.extract-version.outputs.version }}
            ghcr.io/hop-rag/activa-web-server:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: [extract-version, build-backend, build-web]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Deploy to DigitalOcean
        env:
          DEPLOY_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DROPLET_IP }}
          DEPLOY_USER: root
          VERSION: ${{ needs.extract-version.outputs.version }}
          BRANCH: ${{ github.ref_name }}
          PREFERRED_DEPLOY_DIR: /opt/hop
          LEGACY_DEPLOY_DIR: /opt/onyx
          PROXY_CONTAINER: hop-proxy
          LEGACY_PROXY_CONTAINER: onyx-proxy
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          if [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "[ERROR] Missing required secrets: DROPLET_SSH_KEY and DROPLET_IP"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' 'Host *' '  StrictHostKeyChecking no' '  UserKnownHostsFile=/dev/null' '  ServerAliveInterval 30' '  ServerAliveCountMax 10' >> ~/.ssh/config

          echo "[INFO] Deploying version $VERSION to DigitalOcean ($DEPLOY_HOST)"
          echo "[INFO] Preferred deployment directory: $PREFERRED_DEPLOY_DIR"
          echo "[INFO] Backward compatibility enabled with: $LEGACY_DEPLOY_DIR"

          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s -- \
            "$BRANCH" \
            "$PREFERRED_DEPLOY_DIR" \
            "$LEGACY_DEPLOY_DIR" \
            "$PROXY_CONTAINER" \
            "$LEGACY_PROXY_CONTAINER" \
            "$GHCR_TOKEN" <<'EOSSH'
            BRANCH="$1"
            PREFERRED_DEPLOY_DIR="$2"
            LEGACY_DEPLOY_DIR="$3"
            PROXY_CONTAINER="$4"
            LEGACY_PROXY_CONTAINER="$5"
            GHCR_TOKEN="$6"
            set -e

            if [ -d "$PREFERRED_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$PREFERRED_DEPLOY_DIR"
            elif [ -d "$LEGACY_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$LEGACY_DEPLOY_DIR"
            else
              DEPLOY_DIR="$PREFERRED_DEPLOY_DIR"
              mkdir -p "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR" || exit 1

            echo "[INFO] Updating code from release branch ($BRANCH)..."
            git fetch origin "$BRANCH"
            git checkout -- .
            git checkout "origin/$BRANCH"
            git log -1 --oneline

            echo "[INFO] Refreshing docker-compose.yml from deployment/docker_compose..."
            if [ -f deployment/docker_compose/docker-compose.prod.yml ]; then
              cp deployment/docker_compose/docker-compose.prod.yml docker-compose.yml
            elif [ -f deployment/docker_compose/docker-compose.yml ]; then
              cp deployment/docker_compose/docker-compose.yml docker-compose.yml
            else
              echo "[ERROR] No base compose file found for deployment"
              exit 1
            fi

            echo "[INFO] Validating deployment prerequisites..."
            if [ ! -f nginx-simple.conf ]; then
              echo "[ERROR] Missing nginx-simple.conf in $(pwd)"
              exit 1
            fi
            if [ ! -f docker-compose.yml ]; then
              echo "[ERROR] Missing docker-compose.yml in $(pwd)"
              exit 1
            fi

            echo "[INFO] Logging into GHCR..."
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u github-actions --password-stdin

            echo "[INFO] Pulling Docker images..."
            sudo docker compose pull

            echo "[INFO] Stopping current services..."
            sudo docker compose down --remove-orphans
            sudo docker stop "$PROXY_CONTAINER" 2>/dev/null || true
            sudo docker rm "$PROXY_CONTAINER" 2>/dev/null || true
            sudo docker stop "$LEGACY_PROXY_CONTAINER" 2>/dev/null || true
            sudo docker rm "$LEGACY_PROXY_CONTAINER" 2>/dev/null || true

            sleep 2

            echo "[INFO] Starting ACTIVA services without embedded nginx..."
            sudo docker compose up -d --scale nginx=0 2>/dev/null || sudo docker compose up -d

            echo "[INFO] Waiting for services to initialize..."
            sleep 15

            echo "[INFO] Starting database migrations in the background..."
            sudo docker compose exec -d api_server alembic upgrade head 2>/dev/null || true
            sleep 2

            echo "[INFO] Checking nginx-simple.conf state..."
            if [ -d nginx-simple.conf ]; then
              sudo rm -rf nginx-simple.conf
            fi
            if [ ! -f nginx-simple.conf ]; then
              echo "[ERROR] nginx-simple.conf is missing or corrupted"
              exit 1
            fi

            echo "[INFO] Starting dedicated reverse proxy..."
            CONTAINER_ID=$(sudo docker run -d \
              --name "$PROXY_CONTAINER" \
              --network hop_default \
              -p 80:80 \
              -p 443:443 \
              -v "$(pwd)"/nginx-simple.conf:/etc/nginx/nginx.conf:ro \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              -v /var/www/certbot:/var/www/certbot \
              nginx:alpine 2>&1)

            RUN_EXIT_CODE=$?
            if [ $RUN_EXIT_CODE -ne 0 ]; then
              echo "[ERROR] docker run failed while creating the proxy"
              echo "$CONTAINER_ID"
              exit 1
            fi

            sleep 3

            echo "[INFO] Verifying proxy container..."
            if ! sudo docker ps | grep -q "$PROXY_CONTAINER"; then
              echo "[ERROR] Container $PROXY_CONTAINER is not running"
              sudo docker ps
              sudo docker ps -a | grep -E "$PROXY_CONTAINER|$LEGACY_PROXY_CONTAINER" || true
              sudo docker logs "$PROXY_CONTAINER" 2>&1 | tail -30 || true
              exit 1
            fi

            echo "[OK] Deployment completed"
          EOSSH

          echo "[OK] Deployment completed in DigitalOcean (version: $VERSION)"

  verify:
    needs: [extract-version, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify deployment
        env:
          DEPLOY_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DROPLET_IP }}
          DEPLOY_USER: root
          PREFERRED_DEPLOY_DIR: /opt/hop
          LEGACY_DEPLOY_DIR: /opt/onyx
          PROXY_CONTAINER: hop-proxy
          LEGACY_PROXY_CONTAINER: onyx-proxy
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' 'Host *' '  StrictHostKeyChecking no' '  UserKnownHostsFile=/dev/null' '  ServerAliveInterval 30' '  ServerAliveCountMax 10' >> ~/.ssh/config

          echo "[INFO] Running deployment health checks..."

          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s -- \
            "$PREFERRED_DEPLOY_DIR" \
            "$LEGACY_DEPLOY_DIR" \
            "$PROXY_CONTAINER" \
            "$LEGACY_PROXY_CONTAINER" <<'EOSSH'
            PREFERRED_DEPLOY_DIR="$1"
            LEGACY_DEPLOY_DIR="$2"
            PROXY_CONTAINER="$3"
            LEGACY_PROXY_CONTAINER="$4"
            set -e

            if [ -d "$PREFERRED_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$PREFERRED_DEPLOY_DIR"
            elif [ -d "$LEGACY_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$LEGACY_DEPLOY_DIR"
            else
              echo "[ERROR] No valid deployment directory exists"
              exit 1
            fi

            cd "$DEPLOY_DIR" || exit 1

            echo "[INFO] Docker compose status:"
            sudo docker compose ps

            HEALTH_FAILED=0

            echo -n "Backend API: "
            for i in {1..5}; do
              if sudo docker compose exec -T api_server curl -s http://localhost:8080/health >/dev/null 2>&1; then
                echo "ok"
                break
              fi
              if [ $i -lt 5 ]; then
                echo -n "."
                sleep 3
              else
                echo "failed"
                HEALTH_FAILED=1
              fi
            done

            echo -n "PostgreSQL: "
            if sudo docker compose exec -T relational_db pg_isready -U postgres >/dev/null 2>&1; then
              echo "ok"
            else
              echo "failed"
              HEALTH_FAILED=1
            fi

            echo -n "Redis: "
            if sudo docker compose exec -T cache redis-cli ping >/dev/null 2>&1; then
              echo "ok"
            else
              echo "failed"
              HEALTH_FAILED=1
            fi

            echo -n "Proxy nginx: "
            if ! sudo docker ps -a | grep -q "$PROXY_CONTAINER"; then
              echo "not found"
              sudo docker ps -a | grep "$LEGACY_PROXY_CONTAINER" || true
              HEALTH_FAILED=1
            elif ! sudo docker ps | grep -q "$PROXY_CONTAINER"; then
              echo "stopped"
              sudo docker ps -a | grep "$PROXY_CONTAINER" || true
              sudo docker logs "$PROXY_CONTAINER" 2>&1 | tail -20 || true
              HEALTH_FAILED=1
            else
              for i in {1..5}; do
                if curl -s http://localhost/ >/dev/null 2>&1; then
                  echo "ok"
                  break
                fi
                if [ $i -lt 5 ]; then
                  echo -n "."
                  sleep 3
                else
                  echo "no HTTP response"
                  HEALTH_FAILED=1
                fi
              done
            fi

            if [ $HEALTH_FAILED -eq 1 ]; then
              echo "[ERROR] Health checks failed"
              exit 1
            fi

            echo "[OK] All services are operational"
          EOSSH

          echo "[OK] Verification completed"

  tag-deployment:
    needs: [extract-version, deploy, verify]
    if: needs.deploy.result == 'success' && needs.verify.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Tag successful deployment
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          TAG="deployed-$VERSION"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "[INFO] Tag $TAG already exists on remote"
          else
            git tag -a "$TAG" -m "Successfully deployed version: $VERSION" HEAD
            git push origin "$TAG"
            echo "[OK] Created tag: $TAG"
          fi

  auto-rollback:
    needs: [extract-version, deploy, verify]
    if: needs.deploy.result == 'success' && needs.verify.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Auto-rollback to previous version
        env:
          DEPLOY_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DROPLET_IP }}
          DEPLOY_USER: root
          PREFERRED_DEPLOY_DIR: /opt/hop
          LEGACY_DEPLOY_DIR: /opt/onyx
          PROXY_CONTAINER: hop-proxy
          LEGACY_PROXY_CONTAINER: onyx-proxy
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "[WARN] Deployment verification failed. Starting automatic rollback..."

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' 'Host *' '  StrictHostKeyChecking no' '  UserKnownHostsFile=/dev/null' '  ServerAliveInterval 30' '  ServerAliveCountMax 10' >> ~/.ssh/config

          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s -- \
            "$PREFERRED_DEPLOY_DIR" \
            "$LEGACY_DEPLOY_DIR" \
            "$PROXY_CONTAINER" \
            "$LEGACY_PROXY_CONTAINER" \
            "$GHCR_TOKEN" <<'EOSSH'
            PREFERRED_DEPLOY_DIR="$1"
            LEGACY_DEPLOY_DIR="$2"
            PROXY_CONTAINER="$3"
            LEGACY_PROXY_CONTAINER="$4"
            GHCR_TOKEN="$5"
            set -e

            if [ -d "$PREFERRED_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$PREFERRED_DEPLOY_DIR"
            elif [ -d "$LEGACY_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$LEGACY_DEPLOY_DIR"
            else
              echo "[ERROR] No valid deployment directory exists"
              exit 1
            fi

            cd "$DEPLOY_DIR" || exit 1

            echo "[INFO] Current state before rollback:"
            sudo docker compose ps

            git fetch origin main
            git reset --hard origin/main

            if [ -f deployment/docker_compose/docker-compose.prod.yml ]; then
              cp deployment/docker_compose/docker-compose.prod.yml docker-compose.yml
            elif [ -f deployment/docker_compose/docker-compose.yml ]; then
              cp deployment/docker_compose/docker-compose.yml docker-compose.yml
            else
              echo "[ERROR] No base compose file found for rollback"
              exit 1
            fi

            sudo docker compose down --remove-orphans
            sudo docker stop "$PROXY_CONTAINER" 2>/dev/null || true
            sudo docker rm "$PROXY_CONTAINER" 2>/dev/null || true
            sudo docker stop "$LEGACY_PROXY_CONTAINER" 2>/dev/null || true
            sudo docker rm "$LEGACY_PROXY_CONTAINER" 2>/dev/null || true

            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u github-actions --password-stdin
            sudo docker compose pull
            sudo docker compose up -d --scale nginx=0 2>/dev/null || sudo docker compose up -d
            sleep 15
            sudo docker compose exec -T api_server alembic upgrade head || true

            if [ -d nginx-simple.conf ]; then
              sudo rm -rf nginx-simple.conf
            fi
            if [ ! -f nginx-simple.conf ]; then
              echo "[ERROR] Missing nginx-simple.conf after rollback"
              exit 1
            fi

            sudo docker run -d \
              --name "$PROXY_CONTAINER" \
              --network hop_default \
              -p 80:80 \
              -p 443:443 \
              -v "$(pwd)"/nginx-simple.conf:/etc/nginx/nginx.conf:ro \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              -v /var/www/certbot:/var/www/certbot \
              nginx:alpine >/dev/null

            echo "[OK] Automatic rollback completed"
          EOSSH

  notify:
    needs: [extract-version, deploy, verify, tag-deployment, auto-rollback]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deployment summary
        run: |
          DEPLOY_SUCCESS="${{ needs.deploy.result }}"
          VERIFY_SUCCESS="${{ needs.verify.result }}"
          ROLLBACK_TRIGGERED="${{ needs.auto-rollback.result }}"

          if [ "$DEPLOY_SUCCESS" = "success" ] && [ "$VERIFY_SUCCESS" = "success" ]; then
            echo "[OK] Deployment succeeded. Version: ${{ needs.extract-version.outputs.version }}"
            echo "[INFO] Access: https://klugermax.com"
            echo "[INFO] Tag: deployed-${{ needs.extract-version.outputs.version }}"
          elif [ "$ROLLBACK_TRIGGERED" = "success" ]; then
            echo "[WARN] Deployment failed verification and automatic rollback was triggered"
            echo "[ERROR] Version ${{ needs.extract-version.outputs.version }} was rolled back"
            exit 1
          else
            echo "[ERROR] Deployment failed and may require manual intervention"
            exit 1
          fi
