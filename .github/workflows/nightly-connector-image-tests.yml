name: Nightly Connector Image Tests

# Runs the daily connector test suite INSIDE the production backend image
# (backend/Dockerfile) instead of on a bare runner. The bare-runner connector
# job installs Playwright with `--with-deps`, so it never exercises the system
# libraries actually shipped in the image. Running in-image catches
# image-only regressions such as a missing `libnss3.so` (chrome-headless-shell
# failing to load shared libraries after the Dockerfile's apt autoremove
# cascade). Postsubmit/daily only -- this builds an image and hits live sites,
# so it is too heavy for per-PR.

concurrency:
  group: Nightly-Connector-Image-Tests-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    # Daily at 18:00 UTC (11am PT), offset from the bare-runner connector job
    # at 16:00 UTC so the two do not contend for connector test fixtures.
    - cron: "0 18 * * *"

permissions:
  id-token: write # Required for OIDC-based AWS credential exchange
  contents: read

jobs:
  build-backend-image:
    runs-on:
      [
        runs-on,
        runner=8cpu-linux-x64,
        "run-id=${{ github.run_id }}-build-backend-image",
        "extras=ecr-cache",
      ]
    timeout-minutes: 45
    environment: ci-protected
    steps:
      - uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # ratchet:aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get Docker Hub credentials
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # ratchet:aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DOCKER_USERNAME, test/docker-username
            DOCKER_TOKEN, test/docker-token

      - name: Build backend image
        uses: ./.github/actions/build-backend-image
        with:
          runs-on-ecr-cache: ${{ env.RUNS_ON_ECR_CACHE }}
          ref-name: ${{ github.ref_name }}
          pr-number: ${{ github.event.pull_request.number }}
          github-sha: ${{ github.sha }}
          run-id: ${{ github.run_id }}
          docker-username: ${{ env.DOCKER_USERNAME }}
          docker-token: ${{ env.DOCKER_TOKEN }}
          docker-no-cache: ${{ vars.DOCKER_NO_CACHE == 'true' && 'true' || 'false' }}

  connectors-in-image:
    needs: build-backend-image
    runs-on:
      [
        runs-on,
        runner=8cpu-linux-x64,
        "run-id=${{ github.run_id }}-connectors-in-image",
        "extras=ecr-cache",
      ]
    timeout-minutes: 60
    environment: ci-protected

    env:
      # Plain (non-secret) connector test configuration, forwarded into the
      # container. Mirrors pr-python-connector-tests.yml.
      DISABLE_TELEMETRY: "true"
      R2_ACCOUNT_ID_DAILY_CONNECTOR_TESTS: ${{ vars.R2_ACCOUNT_ID_DAILY_CONNECTOR_TESTS }}
      CONFLUENCE_TEST_SPACE_URL: ${{ vars.CONFLUENCE_TEST_SPACE_URL }}
      CONFLUENCE_TEST_SPACE: ${{ vars.CONFLUENCE_TEST_SPACE }}
      CONFLUENCE_USER_NAME: ${{ vars.CONFLUENCE_USER_NAME }}
      SF_USERNAME: ${{ vars.SF_USERNAME }}
      IMAP_HOST: ${{ vars.IMAP_HOST }}
      IMAP_USERNAME: ${{ vars.IMAP_USERNAME }}
      IMAP_MAILBOXES: ${{ vars.IMAP_MAILBOXES }}
      AIRTABLE_TEST_BASE_ID: ${{ vars.AIRTABLE_TEST_BASE_ID }}
      AIRTABLE_TEST_TABLE_ID: ${{ vars.AIRTABLE_TEST_TABLE_ID }}
      AIRTABLE_TEST_TABLE_NAME: ${{ vars.AIRTABLE_TEST_TABLE_NAME }}
      SHAREPOINT_CLIENT_ID: ${{ vars.SHAREPOINT_CLIENT_ID }}
      SHAREPOINT_CLIENT_DIRECTORY_ID: ${{ vars.SHAREPOINT_CLIENT_DIRECTORY_ID }}
      SHAREPOINT_SITE: ${{ vars.SHAREPOINT_SITE }}
      BITBUCKET_EMAIL: ${{ vars.BITBUCKET_EMAIL }}

    steps:
      - uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # ratchet:aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get Docker Hub credentials
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # ratchet:aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DOCKER_USERNAME, test/docker-username
            DOCKER_TOKEN, test/docker-token

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Pull production backend image
        env:
          PROD_IMAGE: ${{ env.RUNS_ON_ECR_CACHE }}:nightly-llm-it-backend-${{ github.run_id }}
        run: docker pull "${PROD_IMAGE}"

      # Run the daily connector suite INSIDE the production image. pytest and the
      # test files are not baked into the prod image (it installs only
      # default.txt + ee.txt and does not COPY ./tests), so we bind-mount the
      # checked-out workspace and layer dev deps in at runtime. The Playwright
      # browser binary and the system libraries it links against (libnss3, etc.)
      # come from the image -- that is the thing under test. AWS credentials are
      # forwarded so the in-container pytest_secrets fixture can batch-fetch
      # connector credentials from Secrets Manager.
      - name: Run connector tests in production image
        shell: script -q -e -c "bash --noprofile --norc -eo pipefail {0}"
        env:
          PROD_IMAGE: ${{ env.RUNS_ON_ECR_CACHE }}:nightly-llm-it-backend-${{ github.run_id }}
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=./backend \
            -e DISABLE_TELEMETRY \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION \
            -e R2_ACCOUNT_ID_DAILY_CONNECTOR_TESTS \
            -e CONFLUENCE_TEST_SPACE_URL \
            -e CONFLUENCE_TEST_SPACE \
            -e CONFLUENCE_USER_NAME \
            -e SF_USERNAME \
            -e IMAP_HOST \
            -e IMAP_USERNAME \
            -e IMAP_MAILBOXES \
            -e AIRTABLE_TEST_BASE_ID \
            -e AIRTABLE_TEST_TABLE_ID \
            -e AIRTABLE_TEST_TABLE_NAME \
            -e SHAREPOINT_CLIENT_ID \
            -e SHAREPOINT_CLIENT_DIRECTORY_ID \
            -e SHAREPOINT_SITE \
            -e BITBUCKET_EMAIL \
            "${PROD_IMAGE}" \
            bash -c '
              set -euo pipefail
              uv pip install --system --no-deps --require-hashes \
                -r backend/requirements/default.txt \
                -r backend/requirements/dev.txt
              py.test \
                -n 8 \
                --dist loadfile \
                --durations=8 \
                -o junit_family=xunit2 \
                -v \
                --ff \
                backend/tests/daily/connectors \
                --ignore backend/tests/daily/connectors/coda
            '

      - name: Alert on Failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"Nightly Connector Image Tests failed! Check the run at: https://github.com/${REPO}/actions/runs/${RUN_ID}\"}" \
            $SLACK_WEBHOOK
