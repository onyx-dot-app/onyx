name: Release Opal

on:
  push:
    tags:
      - "opal/v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Pin bun by image digest. The container ships with bun baked in, so the workflow
    # never invokes `oven-sh/setup-bun` and the runner toolcache is never restored —
    # mitigates zizmor's cache-poisoning class of finding at the source rather than
    # suppressing it. Bumping bun = bump the digest.
    container:
      image: oven/bun:1@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    environment:
      name: release-opal
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web/lib/opal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#opal/v}"
          PKG_VERSION=$(bun -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install workspace deps
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Build opal
        run: bun run build

      - name: Publish to npm
        run: bun publish --provenance --access public
