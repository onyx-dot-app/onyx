# Runs the Craft docker-compose sandbox-proxy tests on each PR that touches
# the docker sandbox manager, the sandbox-proxy package, the compose craft
# overlay, or the install script.
#
# Scope: validates the compose merge + exercises the DockerEventsLookup
# against a real docker socket. Full end-to-end coverage of the approval
# gate against the docker backend (the compose-flavoured analogue of
# `test_approval_gate.py`) is tracked as a follow-up — the gate logic
# itself is backend-agnostic and already covered by the K8s lane and the
# in-process unit tests.
name: Craft Docker-Compose Sandbox Tests
concurrency:
  group: Craft-Compose-Tests-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  merge_group:
  pull_request:
    branches: [main]
    paths:
      - "backend/onyx/sandbox_proxy/**"
      - "backend/onyx/server/features/build/sandbox/docker/**"
      - "backend/onyx/server/features/build/sandbox/kubernetes/docker/Dockerfile"
      - "backend/onyx/server/features/build/sandbox/kubernetes/docker/firewall-init.sh"
      - "backend/tests/unit/sandbox_proxy/**"
      - "backend/tests/unit/onyx/server/features/build/sandbox/test_docker_manager_config.py"
      - "backend/tests/external_dependency_unit/sandbox_proxy/**"
      - "deployment/docker_compose/docker-compose.craft.yml"
      - "deployment/docker_compose/install.sh"
      - ".github/workflows/pr-craft-compose-tests.yml"
      - ".github/actions/setup-python-and-install-dependencies/**"

permissions:
  contents: read

env:
  SANDBOX_BACKEND: "docker"
  # Default compose values (override in env.template if Onyx defaults drift).
  POSTGRES_PASSWORD: "password"
  POSTGRES_USER: "postgres"

jobs:
  craft-compose-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONPATH: ./backend
      DISABLE_TELEMETRY: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and Install Dependencies
        uses: ./.github/actions/setup-python-and-install-dependencies
        with:
          requirements: |
            backend/requirements/default.txt
            backend/requirements/dev.txt
            backend/requirements/ee.txt

      # The compose merge is what install.sh --include-craft renders for
      # self-hosters. If this fails, the operator's first `compose up`
      # silently breaks.
      - name: Validate compose merge
        working-directory: deployment/docker_compose
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.craft.yml \
            --env-file env.template \
            config >/dev/null
          # Confirm the new service is rendered and the external resources
          # are declared with the unprefixed names DockerSandboxManager
          # mounts by.
          rendered=$(docker compose \
            -f docker-compose.yml \
            -f docker-compose.craft.yml \
            --env-file env.template config)
          echo "$rendered" | grep -q "sandbox-proxy:"
          echo "$rendered" | grep -A1 "sandbox_proxy_ca:" | grep -q "name: sandbox_proxy_ca"
          echo "$rendered" | grep -A1 "onyx_craft_sandbox:" | grep -q "name: onyx_craft_sandbox"

      # install.sh idempotency: re-running --include-craft on a host with
      # the resources already present must not fail. The lane creates the
      # resources first, then re-runs the install-time block as a sanity
      # check.
      - name: Pre-create compose-external resources
        run: |
          docker network create onyx_craft_sandbox || true
          docker volume create sandbox_proxy_ca || true
          # Re-run is a no-op (block is wrapped in `docker network inspect`
          # / `docker volume inspect` guards).
          docker network create onyx_craft_sandbox 2>&1 | grep -q "already exists"
          docker volume create sandbox_proxy_ca 2>&1 | grep -q "Volume name is already in use\|already in use"

      # The DockerEventsLookup external-dep tests spin up real busybox
      # containers via the host docker socket — no Postgres, no compose
      # stack needed.
      - name: Pull busybox for DockerEventsLookup tests
        run: docker pull busybox:1.36

      - name: Run new sandbox_proxy unit tests (no deps)
        run: |
          source .venv/bin/activate
          python -m pytest \
            -xvs \
            --durations=8 \
            backend/tests/unit/sandbox_proxy/ \
            backend/tests/unit/onyx/server/features/build/sandbox/test_docker_manager_config.py \
            backend/tests/unit/onyx/server/features/build/sandbox/test_opencode_config.py

      - name: Run DockerEventsLookup external-dep tests
        shell: script -q -e -c "bash --noprofile --norc -eo pipefail {0}"
        run: |
          source .venv/bin/activate
          python -m pytest \
            -xv \
            --durations=8 \
            --log-cli-level=INFO \
            --log-cli-format='%(asctime)s %(levelname)s %(name)s:%(funcName)s:%(lineno)d %(message)s' \
            backend/tests/external_dependency_unit/sandbox_proxy/test_identity_docker_lookup.py

      - name: Docker state on failure
        if: failure()
        run: |
          echo "=== docker ps -a ==="; docker ps -a || true
          echo "=== docker images ==="; docker images || true
          echo "=== docker volume ls ==="; docker volume ls || true
          echo "=== docker network ls ==="; docker network ls || true
