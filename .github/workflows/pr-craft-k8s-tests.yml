name: Craft Kubernetes Sandbox Tests
concurrency:
  group: Craft-K8s-Tests-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  merge_group:
  pull_request:
    branches: [main]
    paths:
      - "backend/onyx/server/features/build/sandbox/**"
      - "backend/tests/external_dependency_unit/craft/test_kubernetes_sandbox.py"
      - ".github/workflows/pr-craft-k8s-tests.yml"
      - ".github/actions/setup-python-and-install-dependencies/**"
      - "deployment/docker_compose/docker-compose.yml"
      - "deployment/docker_compose/docker-compose.dev.yml"

permissions:
  contents: read

env:
  # MinIO (matches pr-external-dependency-unit-tests.yml)
  S3_ENDPOINT_URL: "http://localhost:9004"
  S3_AWS_ACCESS_KEY_ID: "minioadmin"
  S3_AWS_SECRET_ACCESS_KEY: "minioadmin"

  # Sandbox configuration — points the manager at the kind cluster
  # and the locally-built image instead of the published Docker Hub tag.
  # Image lives in a local registry on localhost:5001 (see kind setup
  # below) so containerd inside the kind node can pull it cleanly,
  # avoiding the docker save → /tmp → ctr import pipeline that runs
  # out of disk on tmpfs-backed /tmp.
  SANDBOX_BACKEND: "kubernetes"
  SANDBOX_NAMESPACE: "onyx-sandboxes"
  SANDBOX_SERVICE_ACCOUNT_NAME: "sandbox-file-sync"
  SANDBOX_CONTAINER_IMAGE: "localhost:5001/onyx-sandbox:ci"
  SANDBOX_S3_BUCKET: "onyx-sandbox-snapshots-ci"
  KIND_REGISTRY_NAME: "kind-registry"
  KIND_REGISTRY_PORT: "5001"

  # LLM keys (some tests provision pods with an LLM config; values can be
  # placeholders for tests that don't actually call the model)
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  craft-k8s-tests:
    runs-on:
      - runs-on
      - runner=4cpu-linux-x64
      - hdd=256
      - ${{ format('run-id={0}-craft-k8s-tests', github.run_id) }}
      - extras=s3-cache
    timeout-minutes: 20

    env:
      PYTHONPATH: ./backend
      MODEL_SERVER_HOST: "disabled"
      DISABLE_TELEMETRY: "true"

    steps:
      - uses: runs-on/action@742bf56072eb4845a0f94b3394673e4903c90ff0

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and Install Dependencies
        uses: ./.github/actions/setup-python-and-install-dependencies
        with:
          requirements: |
            backend/requirements/default.txt
            backend/requirements/dev.txt
            backend/requirements/ee.txt

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # network=host so the buildx container can reach the local registry
      # we start below at 127.0.0.1:5001 (without it, "localhost" inside
      # the buildx container resolves to the container, not the host).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      # Start a local Docker registry. kind will pull the sandbox image
      # from here instead of going through `kind load docker-image`, which
      # internally runs `docker save → /tmp tar → docker exec ctr import`
      # and runs out of disk on tmpfs-backed /tmp for our multi-GB image.
      # This is the canonical kind-in-CI pattern documented at
      # https://kind.sigs.k8s.io/docs/user/local-registry/.
      - name: Start local image registry
        run: |
          docker run -d --restart=always \
            -p "127.0.0.1:${KIND_REGISTRY_PORT}:5000" \
            --name "${KIND_REGISTRY_NAME}" \
            registry:2

      # Build the sandbox image from the current tree so PRs that modify
      # the Dockerfile / sandbox sources are tested against their own image,
      # not the published Docker Hub tag. We push directly to the local
      # registry — buildx streams the image to the registry without an
      # intermediate tar, so there's no /tmp pressure regardless of size.
      #
      # GHA layer cache (type=gha) lets unchanged layers be reused across
      # runs. Worst case (Dockerfile base or initial-requirements.txt change)
      # is a full ~8-15 min rebuild; the common case is <1 min.
      - name: Build and push sandbox image to local registry
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # ratchet:docker/build-push-action@v7
        with:
          context: ./backend/onyx/server/features/build/sandbox/kubernetes/docker
          file: ./backend/onyx/server/features/build/sandbox/kubernetes/docker/Dockerfile
          platforms: linux/amd64
          tags: localhost:5001/onyx-sandbox:ci
          push: true
          cache-from: type=gha,scope=craft-sandbox
          cache-to: type=gha,scope=craft-sandbox,mode=max

      # Create kind with a containerd registry config patch so it knows
      # to look up `localhost:5001/*` images via /etc/containerd/certs.d.
      # We populate certs.d after the cluster is up so the kind node can
      # resolve the registry container by its docker network hostname.
      - name: Write kind config
        run: |
          cat > "${RUNNER_TEMP}/kind-config.yaml" <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          containerdConfigPatches:
            - |-
              [plugins."io.containerd.grpc.v1.cri".registry]
                config_path = "/etc/containerd/certs.d"
          EOF

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # ratchet:helm/kind-action@v1.14.0
        with:
          cluster_name: onyx-craft-ci
          config: ${{ runner.temp }}/kind-config.yaml

      # Wire the registry into the kind network so the kind node can
      # resolve "kind-registry:5000". Then write a hosts.toml inside the
      # kind node so `localhost:5001` is rewritten to that hostname.
      - name: Connect local registry to kind network
        run: |
          docker network connect "kind" "${KIND_REGISTRY_NAME}" || true
          REGISTRY_DIR="/etc/containerd/certs.d/localhost:${KIND_REGISTRY_PORT}"
          docker exec onyx-craft-ci-control-plane mkdir -p "${REGISTRY_DIR}"
          docker exec onyx-craft-ci-control-plane bash -c "cat > ${REGISTRY_DIR}/hosts.toml <<EOF
          [host.\"http://${KIND_REGISTRY_NAME}:5000\"]
          EOF"

      # The sandbox manager's pod spec sets nodeSelector
      # `onyx.app/workload=sandbox` (kubernetes_sandbox_manager.py); in
      # production this matches a dedicated node pool. In kind we have a
      # single control-plane node — label it so pods can schedule.
      - name: Label kind node for sandbox workload
        run: kubectl label node onyx-craft-ci-control-plane onyx.app/workload=sandbox

      # Namespace + ServiceAccount that KubernetesSandboxManager expects.
      # In production these come from the helm chart (sandbox-namespace.yaml,
      # gated on ENABLE_CRAFT) plus an out-of-band SA in the internal repo.
      - name: Apply sandbox namespace + ServiceAccount
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: Namespace
          metadata:
            name: onyx-sandboxes
          ---
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: sandbox-file-sync
            namespace: onyx-sandboxes
          EOF

      - name: Create .env for Docker Compose
        run: |
          cat <<EOF > deployment/docker_compose/.env
          COMPOSE_PROFILES=s3-filestore
          DISABLE_TELEMETRY=true
          EOF

      - name: Start Postgres, Redis, MinIO
        run: |
          cd deployment/docker_compose
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.dev.yml \
            up -d \
            minio \
            relational_db \
            cache

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head
          alembic heads --verbose

      - name: Run Craft K8s tests
        shell: script -q -e -c "bash --noprofile --norc -eo pipefail {0}"
        run: |
          py.test \
            --durations=8 \
            -o junit_family=xunit2 \
            -xv \
            --ff \
            -m "not nightly" \
            backend/tests/external_dependency_unit/craft/test_kubernetes_sandbox.py

      - name: Disk and docker status on failure
        if: failure()
        run: |
          echo "=== df -h ==="; df -h || true
          echo "=== docker system df ==="; docker system df || true
          echo "=== docker images ==="; docker images || true
          echo "=== /tmp contents ==="; ls -lah /tmp || true

      - name: Collect kind logs on failure
        if: failure()
        run: |
          mkdir -p kind-logs
          kind export logs ./kind-logs --name onyx-craft-ci || true
          kubectl get pods -A -o wide > kind-logs/pods.txt 2>&1 || true
          kubectl describe pods -n onyx-sandboxes > kind-logs/sandbox-pods-describe.txt 2>&1 || true

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          cd deployment/docker_compose
          containers=$(docker compose -f docker-compose.yml -f docker-compose.dev.yml ps -q)
          for container in $containers; do
            name=$(docker inspect --format='{{.Name}}' "$container" | sed 's/^\///')
            docker logs "$container" > "../../docker-logs/${name}.log" 2>&1
          done

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: craft-k8s-logs
          path: |
            kind-logs/
            docker-logs/
          retention-days: 7
