name: Rollback DigitalOcean Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to roll back to (for example 0.1.0 or latest-stable)"
        required: true
        default: "latest-stable"

permissions:
  contents: read
  packages: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve rollback version
        id: resolve
        run: |
          VERSION_INPUT="${{ github.event.inputs.version }}"

          if [ "$VERSION_INPUT" = "latest-stable" ]; then
            RESOLVED_VERSION=$(git tag -l 'deployed-*' --sort=-version:refname | head -1 | sed 's/deployed-//')
            if [ -z "$RESOLVED_VERSION" ]; then
              echo "[ERROR] No deployed tags were found"
              git tag -l 'deployed-*'
              exit 1
            fi
          else
            RESOLVED_VERSION="$VERSION_INPUT"
          fi

          echo "resolved-version=$RESOLVED_VERSION" >> "$GITHUB_OUTPUT"
          echo "[OK] Resolved rollback version: $RESOLVED_VERSION"

      - name: Run rollback
        env:
          DEPLOY_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DROPLET_IP }}
          DEPLOY_USER: root
          ROLLBACK_VERSION: ${{ steps.resolve.outputs.resolved-version }}
          PREFERRED_DEPLOY_DIR: /opt/hop
          LEGACY_DEPLOY_DIR: /opt/onyx
          PROXY_CONTAINER: hop-proxy
          LEGACY_PROXY_CONTAINER: onyx-proxy
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          if [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "[ERROR] Missing required secrets: DROPLET_SSH_KEY and DROPLET_IP"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' 'Host *' '  StrictHostKeyChecking no' '  UserKnownHostsFile=/dev/null' >> ~/.ssh/config

          echo "[INFO] Starting rollback to version $ROLLBACK_VERSION..."

          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s -- \
            "$ROLLBACK_VERSION" \
            "$PREFERRED_DEPLOY_DIR" \
            "$LEGACY_DEPLOY_DIR" \
            "$PROXY_CONTAINER" \
            "$LEGACY_PROXY_CONTAINER" \
            "$GHCR_TOKEN" <<'EOSSH'
            ROLLBACK_VERSION="$1"
            PREFERRED_DEPLOY_DIR="$2"
            LEGACY_DEPLOY_DIR="$3"
            PROXY_CONTAINER="$4"
            LEGACY_PROXY_CONTAINER="$5"
            GHCR_TOKEN="$6"
            set -e

            if [ -d "$PREFERRED_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$PREFERRED_DEPLOY_DIR"
            elif [ -d "$LEGACY_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$LEGACY_DEPLOY_DIR"
            else
              echo "[ERROR] No valid deployment directory exists"
              exit 1
            fi

            cd "$DEPLOY_DIR" || exit 1

            BACKUP_DIR="/opt/hop-backup-$(date +%s)"
            echo "[INFO] Creating backup at $BACKUP_DIR..."
            sudo cp -r . "$BACKUP_DIR"

            echo "[INFO] Syncing git references..."
            git fetch origin --tags
            git fetch origin main

            if git rev-parse "deployed-$ROLLBACK_VERSION" >/dev/null 2>&1; then
              TARGET_REF="deployed-$ROLLBACK_VERSION"
            elif git rev-parse "v$ROLLBACK_VERSION" >/dev/null 2>&1; then
              TARGET_REF="v$ROLLBACK_VERSION"
            else
              TARGET_REF="origin/main"
            fi

            echo "[INFO] Applying rollback from $TARGET_REF..."
            git checkout "$TARGET_REF"

            echo "[INFO] Refreshing docker-compose.yml..."
            if [ -f deployment/docker_compose/docker-compose.prod.yml ]; then
              cp deployment/docker_compose/docker-compose.prod.yml docker-compose.yml
            elif [ -f deployment/docker_compose/docker-compose.yml ]; then
              cp deployment/docker_compose/docker-compose.yml docker-compose.yml
            else
              echo "[ERROR] No base compose file found for rollback"
              exit 1
            fi

            if [ ! -f docker-compose.yml ]; then
              echo "[ERROR] Missing docker-compose.yml after refresh"
              exit 1
            fi

            sudo docker compose down --remove-orphans
            sudo docker stop "$PROXY_CONTAINER" 2>/dev/null || true
            sudo docker rm "$PROXY_CONTAINER" 2>/dev/null || true
            sudo docker stop "$LEGACY_PROXY_CONTAINER" 2>/dev/null || true
            sudo docker rm "$LEGACY_PROXY_CONTAINER" 2>/dev/null || true

            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u github-actions --password-stdin
            sudo docker compose pull
            sudo docker compose up -d --scale nginx=0 2>/dev/null || sudo docker compose up -d

            sleep 15

            sudo docker compose exec -T api_server alembic upgrade head || true

            if [ -d nginx-simple.conf ]; then
              sudo rm -rf nginx-simple.conf
            fi
            if [ ! -f nginx-simple.conf ]; then
              echo "[ERROR] Missing nginx-simple.conf after rollback"
              exit 1
            fi

            sudo docker run -d \
              --name "$PROXY_CONTAINER" \
              --network hop_default \
              -p 80:80 \
              -p 443:443 \
              -v "$(pwd)"/nginx-simple.conf:/etc/nginx/nginx.conf:ro \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              -v /var/www/certbot:/var/www/certbot \
              nginx:alpine >/dev/null

            echo "[OK] Rollback completed to $ROLLBACK_VERSION"
          EOSSH

          echo "[OK] Rollback completed"

      - name: Verify rollback
        env:
          DEPLOY_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DROPLET_IP }}
          DEPLOY_USER: root
          PREFERRED_DEPLOY_DIR: /opt/hop
          LEGACY_DEPLOY_DIR: /opt/onyx
          PROXY_CONTAINER: hop-proxy
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' 'Host *' '  StrictHostKeyChecking no' '  UserKnownHostsFile=/dev/null' >> ~/.ssh/config

          echo "[INFO] Verifying rollback status..."

          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s -- \
            "$PREFERRED_DEPLOY_DIR" \
            "$LEGACY_DEPLOY_DIR" \
            "$PROXY_CONTAINER" <<'EOSSH'
            PREFERRED_DEPLOY_DIR="$1"
            LEGACY_DEPLOY_DIR="$2"
            PROXY_CONTAINER="$3"
            set -e

            if [ -d "$PREFERRED_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$PREFERRED_DEPLOY_DIR"
            elif [ -d "$LEGACY_DEPLOY_DIR" ]; then
              DEPLOY_DIR="$LEGACY_DEPLOY_DIR"
            else
              echo "[ERROR] No valid deployment directory exists"
              exit 1
            fi

            cd "$DEPLOY_DIR" || exit 1

            sudo docker compose ps

            echo -n "Backend API: "
            if sudo docker compose exec -T api_server curl -s http://localhost:8080/health >/dev/null 2>&1; then
              echo "ok"
            else
              echo "failed"
              exit 1
            fi

            echo -n "PostgreSQL: "
            if sudo docker compose exec -T relational_db pg_isready -U postgres >/dev/null 2>&1; then
              echo "ok"
            else
              echo "failed"
              exit 1
            fi

            echo -n "Redis: "
            if sudo docker compose exec -T cache redis-cli ping >/dev/null 2>&1; then
              echo "ok"
            else
              echo "failed"
              exit 1
            fi

            echo -n "Proxy nginx: "
            if sudo docker ps | grep -q "$PROXY_CONTAINER" && curl -s http://localhost/ >/dev/null 2>&1; then
              echo "ok"
            else
              echo "failed"
              sudo docker logs "$PROXY_CONTAINER" 2>&1 | tail -20 || true
              exit 1
            fi

            echo "[OK] Rollback verification passed"
          EOSSH

      - name: Rollback summary
        if: success()
        run: |
          echo "[OK] Rollback succeeded"
          echo "[INFO] Access: https://klugermax.com"
          echo "[INFO] Backups saved in /opt/hop-backup-*"
