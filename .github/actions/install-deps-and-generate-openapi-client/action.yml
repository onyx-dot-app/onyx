name: "Install Python deps and generate OpenAPI client"
description: "Sets up a host-side Python venv with backend deps and runs `ods openapi all` to produce backend/generated/openapi.json and the Python client."
runs:
  using: "composite"
  steps:
    - name: Setup Python and Install Dependencies
      uses: ./.github/actions/setup-python-and-install-dependencies
      with:
        requirements: |
          backend/requirements/default.txt
          backend/requirements/dev.txt

    - name: Generate OpenAPI schema and Python client
      shell: bash
      env:
        LICENSE_ENFORCEMENT_ENABLED: "false"
      run: |
        ods openapi all
