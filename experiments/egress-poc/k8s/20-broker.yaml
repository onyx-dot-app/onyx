apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker
  namespace: egress-poc
  labels:
    app: broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broker
  template:
    metadata:
      labels:
        app: broker
    spec:
      containers:
        - name: broker
          image: egress-poc/broker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: EGRESS_DEFAULT_DENY
              value: "false"
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 1
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: broker
  namespace: egress-poc
spec:
  selector:
    app: broker
  ports:
    - name: http
      port: 8000
      targetPort: 8000
