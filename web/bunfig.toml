[test]
# Bun reads tsconfig.json `paths` natively, so @/, @tests/, @opal/ all resolve
# without extra mapping (vs Jest's moduleNameMapper).
#
# preload runs once before any test module is evaluated. It registers happy-dom
# globally and extends `expect` with @testing-library/jest-dom matchers, so DOM
# tests can use `render()`, `screen`, and `.toBeInTheDocument()` like under Jest.
preload = ["./tests/setup/bun.setup.ts"]

# Playwright e2e tests have their own runner (`npx playwright test`) and live in
# tests/e2e. Exclude them from `bun test` so they don't get loaded as unit tests.
pathIgnorePatterns = ["**/tests/e2e/**"]
