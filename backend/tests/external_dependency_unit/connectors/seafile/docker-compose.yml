services:
  db:
    image: ${SEAFILE_DB_IMAGE:-mariadb:10.11}
    environment:
      MYSQL_ROOT_PASSWORD: ${INIT_SEAFILE_MYSQL_ROOT_PASSWORD:-seafile-test-root-password}
      MYSQL_LOG_CONSOLE: "true"
      MARIADB_AUTO_UPGRADE: "1"
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/healthcheck.sh",
          "--connect",
          "--mariadbupgrade",
          "--innodb_initialized",
        ]
      interval: 5s
      start_period: 20s
      timeout: 5s
      retries: 30
    volumes:
      - seafile-mysql:/var/lib/mysql

  redis:
    image: ${SEAFILE_REDIS_IMAGE:-redis}
    command:
      - /bin/sh
      - -c
      - redis-server --requirepass "$$REDIS_PASSWORD"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-seafile-test-redis-password}

  seafile:
    image: ${SEAFILE_IMAGE:-seafileltd/seafile-mc:13.0-latest}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:${SEAFILE_TEST_PORT:-18080}:80"
    environment:
      SEAFILE_MYSQL_DB_HOST: db
      SEAFILE_MYSQL_DB_PORT: "3306"
      SEAFILE_MYSQL_DB_USER: seafile
      SEAFILE_MYSQL_DB_PASSWORD: ${SEAFILE_MYSQL_DB_PASSWORD:-seafile-test-db-password}
      INIT_SEAFILE_MYSQL_ROOT_PASSWORD: ${INIT_SEAFILE_MYSQL_ROOT_PASSWORD:-seafile-test-root-password}
      SEAFILE_MYSQL_DB_CCNET_DB_NAME: ccnet_db
      SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: seafile_db
      SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: seahub_db
      TIME_ZONE: Etc/UTC
      INIT_SEAFILE_ADMIN_EMAIL: ${INIT_SEAFILE_ADMIN_EMAIL:-seafile-test@example.com}
      INIT_SEAFILE_ADMIN_PASSWORD: ${INIT_SEAFILE_ADMIN_PASSWORD:-seafile-test-password}
      SEAFILE_SERVER_HOSTNAME: ${SEAFILE_SERVER_HOSTNAME:-127.0.0.1:${SEAFILE_TEST_PORT:-18080}}
      SEAFILE_SERVER_PROTOCOL: http
      SITE_ROOT: /
      NON_ROOT: "false"
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-seafile-test-jwt-private-key-1234567890}
      SEAFILE_LOG_TO_STDOUT: "true"
      ENABLE_GO_FILESERVER: "true"
      ENABLE_SEADOC: "false"
      CACHE_PROVIDER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-seafile-test-redis-password}
      ENABLE_NOTIFICATION_SERVER: "false"
      ENABLE_SEAFILE_AI: "false"
      ENABLE_FACE_RECOGNITION: "false"
      MD_FILE_COUNT_LIMIT: "100000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api2/ping/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - seafile-data:/shared

volumes:
  seafile-data:
  seafile-mysql:
